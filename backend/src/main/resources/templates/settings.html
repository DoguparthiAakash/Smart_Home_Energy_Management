<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Settings - My Home</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-group-bg: #FFFFFF;
            --ios-label: #000000;
            --ios-muted: #8E8E93;
            --ios-separator: rgba(60, 60, 67, 0.36);
        }

        [data-theme="dark"] {
            --ios-bg: #000000;
            --ios-group-bg: #1C1C1E;
            --ios-label: #FFFFFF;
            --ios-muted: #8E8E93;
            --ios-separator: rgba(84, 84, 88, 0.65);
        }

        body {
            background-color: var(--ios-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--ios-label);
            margin: 0;
            padding: 0;
            padding-bottom: 160px;
        }

        .settings-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .settings-header {
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .settings-section-title {
            font-size: 13px;
            text-transform: uppercase;
            color: var(--ios-muted);
            margin: 20px 16px 8px;
            letter-spacing: 0.3px;
        }

        .ios-group {
            background: var(--ios-group-bg);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .ios-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 16px;
            min-height: 44px;
            position: relative;
        }

        .ios-row:not(:last-child)::after {
            content: "";
            position: absolute;
            left: 54px;
            right: 0;
            bottom: 0;
            height: 0.5px;
            background-color: var(--ios-separator);
        }

        /* Group without icons should have shorter separator */
        .ios-group.no-icons .ios-row:not(:last-child)::after {
            left: 16px;
        }

        .ios-row-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ios-icon {
            width: 29px;
            height: 29px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
        }

        .ios-row-label {
            font-size: 17px;
            font-weight: 400;
        }

        .ios-row-value {
            font-size: 17px;
            color: var(--ios-muted);
        }

        .ios-btn {
            background: none;
            border: none;
            color: #007AFF;
            font-size: 17px;
            padding: 0;
            cursor: pointer;
        }

        .ios-btn-destructive {
            color: #FF3B30;
        }

        .ios-btn-block {
            width: 100%;
            text-align: center;
            padding: 11px 16px;
            background: var(--ios-group-bg);
            border-radius: 10px;
            font-size: 17px;
            color: #007AFF;
            border: none;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .ios-input {
            background: none;
            border: none;
            color: var(--ios-label);
            font-size: 17px;
            width: 100%;
            text-align: right;
            padding: 0;
        }

        .ios-input:focus {
            outline: none;
        }

        .ios-card-content {
            padding: 0 16px 16px;
            font-size: 15px;
            color: var(--ios-muted);
        }

        /* 2FA Setup Styles */
        #2faSetup {
            background: var(--ios-group-bg);
            border-radius: 10px;
            padding: 16px;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        #qrcode {
            background: white;
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
        }

        .ios-setup-header {
            font-size: 15px;
            color: var(--ios-muted);
            margin-bottom: 12px;
        }

        /* Glassmorphism overlays */
        .glass-icon-bg {
            background: rgba(120, 120, 128, 0.16);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="">
    <div class="settings-container">
        <h1 class="settings-header">Settings</h1>
        <div th:if="${userRole.contains('GUEST')}"
            style="margin-bottom: 20px; background: rgba(255,149,0,0.1); color: #FF9500; padding: 12px 16px; border-radius: 12px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z" />
            </svg>
            Guest Mode - Read Only Access
        </div>

        <!-- System Section -->
        <h3 class="settings-section-title">System</h3>
        <div class="ios-group">
            <div class="ios-row">
                <div class="ios-row-left">
                    <div class="ios-icon" style="background: #007AFF;">
                        <svg style="width: 20px; height: 20px;" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M12 3C7.03 3 3 7.03 3 12C3 16.97 7.03 21 12 21C16.97 21 21 16.97 21 12C21 7.03 16.97 3 12 3M12 19C8.13 19 5 15.87 5 12C5 8.13 8.13 5 12 5C15.87 5 19 8.13 19 12C19 15.87 15.87 19 12 19M12 7V17M12 7L7 12M12 7L17 12" />
                        </svg>
                    </div>
                    <span class="ios-row-label">Dark Mode</span>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <!-- Display Settings -->
        <div th:if="${!userRole.contains('GUEST')}">
            <h3 class="settings-section-title">Display</h3>
            <div class="ios-group">
                <div class="ios-row">
                    <div class="ios-row-left">
                        <div class="ios-icon" style="background: #34C759;">
                            <svg style="width: 20px; height: 20px;" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M13 2L3 14H12V22L22 10H13V2Z" />
                            </svg>
                        </div>
                        <span class="ios-row-label">Live Power Bar</span>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="livePowerToggle"
                            onchange="toggleSetting('showLivePower', this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="ios-row">
                    <div class="ios-row-left">
                        <div class="ios-icon" style="background: #FF9500;">
                            <svg style="width: 20px; height: 20px;" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3M9 17H7V10H9V17M13 17H11V7H13V17M17 17H15V13H17V17Z" />
                            </svg>
                        </div>
                        <span class="ios-row-label">Daily Usage Chart</span>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="chartToggle"
                            onchange="toggleSetting('showDailyChart', this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <!-- Security Settings -->
        <div th:if="${!userRole.contains('GUEST')}">
            <h3 class="settings-section-title">Security</h3>
            <div class="ios-group">
                <div class="ios-row">
                    <div class="ios-row-left">
                        <div class="ios-icon" style="background: #5856D6;">
                            <svg style="width: 20px; height: 20px;" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z" />
                            </svg>
                        </div>
                        <span class="ios-row-label">Two-Factor Auth</span>
                    </div>
                    <span id="2faStatus" class="ios-row-value">Disabled</span>
                </div>
            </div>

            <div id="2faSetup" style="display: none;">
                <p class="ios-setup-header">Scan with Microsoft Authenticator</p>
                <div style="text-align: center; margin-bottom: 20px;">
                    <div id="qrcode"></div>
                </div>
                <div class="ios-group">
                    <div class="ios-row">
                        <span class="ios-row-label">Manual Key</span>
                        <code id="manualKey"
                            style="font-family: monospace; font-size: 14px; user-select: all;">Loading...</code>
                    </div>
                    <div class="ios-row">
                        <input type="text" id="verifyCode" class="ios-input" placeholder="6-digit code">
                    </div>
                </div>
                <button onclick="enable2FA()" class="ios-btn-block">Verify & Enable</button>
                <button onclick="cancelSetup()" class="ios-btn-block"
                    style="background: none; margin-top: -12px; color: var(--ios-muted);">Cancel Setup</button>
            </div>

            <button id="setupBtn" onclick="startSetup()" class="ios-btn-block">Set Up Two-Factor Authentication</button>
            <button id="disableBtn" onclick="disable2FA()" class="ios-btn-block ios-btn-destructive"
                style="display: none;">Disable Two-Factor Authentication</button>

            <h3 class="settings-section-title">Recovery</h3>
            <div class="ios-group no-icons">
                <div class="ios-row">
                    <span class="ios-row-label">Mobile</span>
                    <input type="tel" id="recoveryMobile" placeholder="+91 99999 99999" class="ios-input">
                </div>
                <div class="ios-row">
                    <span class="ios-row-label">Email</span>
                    <input type="email" id="recoveryEmail" placeholder="backup@example.com" class="ios-input">
                </div>
            </div>
            <button onclick="saveRecoveryOptions()" class="ios-btn-block">Save Recovery Options</button>
        </div>
    </div>

    <!-- Bottom Navigation Dock -->
    <div class="dock-container">
        <a href="/home" class="dock-item">
            <svg class="dock-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z" />
            </svg>
            <span class="dock-label">Home</span>
        </a>

        <a th:if="${!userRole.contains('GUEST')}" href="/usage" class="dock-item">
            <svg class="dock-icon" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M16 6L18.29 8.29L13.41 13.17L9.41 9.17L2 16.59L3.41 18L9.41 12L13.41 16L19.71 9.71L22 12V6H16Z" />
            </svg>
            <span class="dock-label">Usage</span>
        </a>

        <a href="/settings" class="dock-item active">
            <svg class="dock-icon" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z" />
            </svg>
            <span class="dock-label">Settings</span>
        </a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        let secretKey = '';

        async function checkStatus() {
            try {
                const res = await fetch('/api/auth/2fa/status');
                if (res.ok) {
                    const data = await res.json();
                    if (data.enabled) {
                        document.getElementById('2faStatus').innerText = 'Enabled';
                        document.getElementById('2faStatus').style.color = '#34C759';
                        document.getElementById('setupBtn').style.display = 'none';
                        document.getElementById('disableBtn').style.display = 'block';
                        document.getElementById('2faSetup').style.display = 'none';
                    } else {
                        document.getElementById('2faStatus').innerText = 'Disabled';
                        document.getElementById('2faStatus').style.color = 'var(--ios-muted)';
                        document.getElementById('setupBtn').style.display = 'block';
                        document.getElementById('disableBtn').style.display = 'none';
                    }
                }
            } catch (e) { console.error(e); }
        }

        async function startSetup() {
            document.getElementById('2faSetup').style.display = 'block';
            document.getElementById('setupBtn').style.display = 'none';

            try {
                const res = await fetch('/api/auth/2fa/generate', { method: 'POST' });
                if (res.ok) {
                    const data = await res.json();
                    secretKey = data.secret;

                    // Show Manual Key
                    document.getElementById('manualKey').innerText = secretKey;

                    // Render QR
                    document.getElementById('qrcode').innerHTML = '';
                    new QRCode(document.getElementById('qrcode'), {
                        text: data.otpAuthUrl,
                        width: 150,
                        height: 150
                    });
                } else {
                    alert("Failed to generate key");
                    cancelSetup();
                }
            } catch (e) {
                console.error(e);
                alert("Error connecting to server");
                cancelSetup();
            }
        }

        function cancelSetup() {
            document.getElementById('2faSetup').style.display = 'none';
            document.getElementById('setupBtn').style.display = 'block';
            document.getElementById('qrcode').innerHTML = '';
            document.getElementById('verifyCode').value = '';
        }

        async function enable2FA() {
            const code = document.getElementById('verifyCode').value.trim();

            if (!code || code.length < 6) {
                alert("Please enter the 6-digit code from your app");
                return;
            }

            const res = await fetch('/api/auth/2fa/enable', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code, secret: secretKey })
            });

            if (res.ok) {
                alert('2FA Enabled Successfully');
                checkStatus();
            } else {
                const msg = await res.text();
                alert('Verification Failed: ' + msg);
            }
        }

        async function disable2FA() {
            if (!confirm('Disable 2FA?')) return;
            const res = await fetch('/api/auth/2fa/disable', { method: 'POST' });
            if (res.ok) {
                checkStatus();
            }
        }

        async function saveRecoveryOptions() {
            const mobile = document.getElementById('recoveryMobile').value;
            const email = document.getElementById('recoveryEmail').value;

            try {
                const res = await fetch('/api/recovery/options', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: mobile, recoveryEmail: email })
                });

                if (res.ok) {
                    alert('Recovery options saved successfully!');
                } else {
                    alert('Failed to save options.');
                }
            } catch (e) { console.error(e); }
        }

        async function loadRecoveryOptions() {
            try {
                const res = await fetch('/api/recovery/options');
                if (res.ok) {
                    const data = await res.json();
                    if (data.mobile) document.getElementById('recoveryMobile').value = data.mobile;
                    if (data.recoveryEmail) document.getElementById('recoveryEmail').value = data.recoveryEmail;
                }
            } catch (e) { console.error(e); }
        }

        checkStatus();
        loadRecoveryOptions();

        // Check for saved theme
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme) {
            document.documentElement.setAttribute('data-theme', currentTheme);
            if (currentTheme === 'dark') {
                document.getElementById('themeToggle').checked = true;
            }
        }

        // Init other settings
        if (localStorage.getItem('showLivePower') !== 'false') { // Default True if not set
            document.getElementById('livePowerToggle').checked = true;
        } else {
            document.getElementById('livePowerToggle').checked = false;
        }

        if (localStorage.getItem('showDailyChart') !== 'false') { // Default True
            document.getElementById('chartToggle').checked = true;
        } else {
            document.getElementById('chartToggle').checked = false;
        }

        function toggleTheme() {
            const toggle = document.getElementById('themeToggle');
            if (toggle.checked) {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            }
        }

        function toggleSetting(key, isChecked) {
            localStorage.setItem(key, isChecked);
        }
    </script>
</body>

</html>
